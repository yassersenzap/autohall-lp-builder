# Connexion PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ah_lp_builder_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ah_admin_lp}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:autohall_dev_2026}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Port du serveur
server.port=${SERVER_PORT:8080}

# API / Security
app.cors.allowed-origins=${AUTOHALL_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.security.admin-api-key=${AUTOHALL_ADMIN_API_KEY:dev-admin-key-change-me}

# Error responses
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
