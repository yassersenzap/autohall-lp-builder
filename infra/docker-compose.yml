services:
  database:
    image: postgres:16-alpine
    container_name: ah-lp-builder-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ah_admin_lp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-ah_lp_builder_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ah_lp_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ah_lp_data:
